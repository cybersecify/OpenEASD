name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test & Security Scan
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get install -y libcairo2-dev gcc

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests (fast — exclude slow DNS tests)
        env:
          SECRET_KEY: "ci-test-secret-key-not-used-in-prod"
          DEBUG: "True"
        run: uv run pytest tests/ --ignore=tests/unit/test_domain_security.py -q

      - name: SAST — bandit
        run: uv run bandit -r apps/ openeasd/ -ll -x tests/
        # -ll = LOW+ severity only (skip INFO noise); -x = exclude test dirs

      - name: Dependency vulnerability scan — pip-audit
        run: uv run pip-audit --ignore-vuln PYSEC-2025-183
        # PYSEC-2025-183 (pyjwt weak key length) is disputed by PyJWT maintainers — no fix available

  frontend:
    name: Frontend Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
