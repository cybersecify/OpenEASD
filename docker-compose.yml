services:
  openeasd:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - openeasd_data:/app/data
      - openeasd_logs:/app/logs
    environment:
      # Required in production — change these
      SECRET_KEY: "change-me-in-production"
      DEBUG: "false"
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0"
      # Optional alert channels
      # SLACK_WEBHOOK_URL: ""
      # MS_TEAMS_WEBHOOK_URL: ""
      # ALERT_SEVERITY_THRESHOLD: "high"
      # Scan schedule (24h, UTC+5:30 by default)
      # SCAN_DAILY_HOUR: "2"
      # SCAN_DAILY_MINUTE: "0"
      # Tool paths (defaults point to /usr/local/bin/pdtm-tools/)
      TOOL_SUBFINDER: "/usr/local/bin/pdtm-tools/subfinder"
      TOOL_DNSX: "/usr/local/bin/pdtm-tools/dnsx"
      TOOL_NAABU: "/usr/local/bin/pdtm-tools/naabu"
      TOOL_HTTPX: "/usr/local/bin/pdtm-tools/httpx"
      TOOL_NUCLEI: "/usr/local/bin/pdtm-tools/nuclei"
      TOOL_AMASS: "/usr/local/bin/amass"
      TOOL_NMAP: "nmap"
    restart: unless-stopped

volumes:
  openeasd_data:
  openeasd_logs:
