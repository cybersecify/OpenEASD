version: "3.9"

# OpenEASD Django - Docker Compose
# Replaces Prefect orchestration with Celery + Redis

networks:
  openeasd-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
  app-data:

services:
  # Redis broker for Celery
  redis:
    image: redis:7-alpine
    container_name: openeasd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - openeasd-network

  # Django web application
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openeasd-web
    restart: unless-stopped
    command: gunicorn
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
      - ../logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=openeasd.settings
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_CHANNEL=${SLACK_CHANNEL:-#security-alerts}
      - ALERT_SEVERITY_THRESHOLD=${ALERT_SEVERITY_THRESHOLD:-high}
      - USE_DOCKER_TOOLS=true
    depends_on:
      - redis
    networks:
      - openeasd-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery worker (replaces Prefect agent)
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openeasd-celery-worker
    restart: unless-stopped
    command: celery-worker
    volumes:
      - app-data:/app/data
      - ../logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=openeasd.settings
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - USE_DOCKER_TOOLS=true
    depends_on:
      - redis
      - web
    networks:
      - openeasd-network

  # Celery Beat scheduler (replaces Prefect schedules)
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openeasd-celery-beat
    restart: unless-stopped
    command: celery-beat
    volumes:
      - app-data:/app/data
      - ../logs:/app/logs
    environment:
      - DJANGO_SETTINGS_MODULE=openeasd.settings
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - web
    networks:
      - openeasd-network

  # Security tools (optional profile)
  subfinder:
    image: projectdiscovery/subfinder:latest
    container_name: openeasd-subfinder
    profiles: ["tools"]
    networks:
      - openeasd-network

  naabu:
    image: projectdiscovery/naabu:latest
    container_name: openeasd-naabu
    profiles: ["tools"]
    networks:
      - openeasd-network

  nuclei:
    image: projectdiscovery/nuclei:latest
    container_name: openeasd-nuclei
    profiles: ["tools"]
    volumes:
      - ../config:/config
    networks:
      - openeasd-network
