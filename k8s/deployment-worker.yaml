apiVersion: apps/v1
kind: Deployment
metadata:
  name: openeasd-worker
  namespace: openeasd
  labels:
    app: openeasd
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openeasd
      component: worker
  template:
    metadata:
      labels:
        app: openeasd
        component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/cybersecify/openeasd:latest
          command:
            - python
            - manage.py
            - qcluster
          envFrom:
            - configMapRef:
                name: openeasd-config
            - secretRef:
                name: openeasd-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          securityContext:
            capabilities:
              add:
                - NET_RAW   # required for nmap and naabu port scanning
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openeasd-data
        - name: logs
          persistentVolumeClaim:
            claimName: openeasd-logs
