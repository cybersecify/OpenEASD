apiVersion: apps/v1
kind: Deployment
metadata:
  name: openeasd
  namespace: default
  labels:
    app: openeasd
spec:
  # SQLite (RWO PVC) — single replica required.
  # To scale horizontally, migrate to PostgreSQL.
  replicas: 1
  # Recreate (not RollingUpdate): the single RWO data PVC can only be mounted by
  # one pod at a time, so a rolling update deadlocks — the new pod stays Pending
  # on the volume while the old pod refuses to terminate. Recreate tears the old
  # pod down first, then starts the new one.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openeasd
  template:
    metadata:
      labels:
        app: openeasd
    spec:
      initContainers:
        - name: init
          image: ghcr.io/cybersecify/openeasd:latest
          # Always re-pull: the :latest tag is mutable, so a deploy that doesn't
          # change the tag string must still fetch the new digest. Without this,
          # k8s defaults to IfNotPresent semantics against the cached image and
          # silently keeps running the old build.
          imagePullPolicy: Always
          command: ["./docker-entrypoint.sh", "true"]
          envFrom:
            - configMapRef:
                name: openeasd-config
            - secretRef:
                name: openeasd-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs

      containers:
        - name: web
          image: ghcr.io/cybersecify/openeasd:latest
          imagePullPolicy: Always
          command:
            - gunicorn
            - openeasd.wsgi:application
            - --bind
            - "0.0.0.0:8000"
            - --workers
            - "2"
            - --timeout
            - "120"
            - --access-logfile
            - "-"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: openeasd-config
            - secretRef:
                name: openeasd-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: openeasd.local
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: openeasd.local
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

        - name: worker
          image: ghcr.io/cybersecify/openeasd:latest
          imagePullPolicy: Always
          command:
            - python
            - manage.py
            - qcluster
          envFrom:
            - configMapRef:
                name: openeasd-config
            - secretRef:
                name: openeasd-secret
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          securityContext:
            capabilities:
              add:
                - NET_RAW   # required for nmap and naabu port scanning
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openeasd-data
        - name: logs
          persistentVolumeClaim:
            claimName: openeasd-logs
