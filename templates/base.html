<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}OpenEASD{% endblock %} — Attack Surface Detection</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-indigo-700 text-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'dashboard' %}" class="font-bold text-lg tracking-tight">OpenEASD</a>
      <div class="flex gap-6 text-sm font-medium">
        <a href="{% url 'dashboard' %}" class="hover:text-indigo-200">Dashboard</a>
        <a href="{% url 'domain-list' %}" class="hover:text-indigo-200">Domains</a>
        <a href="{% url 'scan-list' %}" class="hover:text-indigo-200">Scans</a>
        <a href="{% url 'insights' %}" class="hover:text-indigo-200">Insights</a>
        <a href="{% url 'workflow-list' %}" class="hover:text-indigo-200">Workflows</a>
        <form method="post" action="{% url 'logout' %}" class="inline">
          {% csrf_token %}
          <button type="submit" class="hover:text-indigo-200 text-sm font-medium">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    {% if messages %}
    <div class="mb-6 space-y-2">
      {% for message in messages %}
      <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
           class="px-4 py-3 rounded-lg text-sm flex items-center justify-between
             {% if message.tags == 'success' %}bg-green-50 border border-green-200 text-green-700
             {% elif message.tags == 'error' %}bg-red-50 border border-red-200 text-red-700
             {% elif message.tags == 'warning' %}bg-yellow-50 border border-yellow-200 text-yellow-700
             {% else %}bg-blue-50 border border-blue-200 text-blue-700{% endif %}">
        <span>{{ message }}</span>
        <button @click="show = false" class="text-gray-400 hover:text-gray-600 ml-4">&times;</button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

</body>
</html>
