{% extends "base.html" %}

{% block title %}Health{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto bg-[#111111] rounded-lg border border-[rgba(255,255,255,0.10)] p-6">
  <h1 class="text-xl font-bold text-white mb-4">System Health</h1>
  <dl class="space-y-2 text-sm">
    <div class="flex justify-between">
      <dt class="text-white/65">Service</dt>
      <dd class="font-medium text-white">{{ service }}</dd>
    </div>
    <div class="flex justify-between">
      <dt class="text-white/65">Version</dt>
      <dd class="font-medium text-white">{{ version }}</dd>
    </div>
    <div class="flex justify-between">
      <dt class="text-white/65">Database</dt>
      <dd class="font-medium {% if db_status == 'connected' %}text-[#30c074]{% else %}text-[#fca5a5]{% endif %}">
        {{ db_status }}
      </dd>
    </div>
  </dl>
</div>
{% endblock %}
