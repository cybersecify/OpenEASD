{% extends "base.html" %}

{% block title %}Health{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto bg-white rounded-lg shadow p-6">
  <h1 class="text-xl font-bold text-gray-900 mb-4">System Health</h1>
  <dl class="space-y-2 text-sm">
    <div class="flex justify-between">
      <dt class="text-gray-500">Service</dt>
      <dd class="font-medium text-gray-900">{{ service }}</dd>
    </div>
    <div class="flex justify-between">
      <dt class="text-gray-500">Version</dt>
      <dd class="font-medium text-gray-900">{{ version }}</dd>
    </div>
    <div class="flex justify-between">
      <dt class="text-gray-500">Database</dt>
      <dd class="font-medium {% if db_status == 'connected' %}text-green-600{% else %}text-red-600{% endif %}">
        {{ db_status }}
      </dd>
    </div>
  </dl>
</div>
{% endblock %}
