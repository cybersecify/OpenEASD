<select name="status"
        hx-post="{% url 'finding-update-status' finding.id %}"
        hx-target="#finding-status-{{ finding.id }}"
        hx-swap="innerHTML"
        class="text-xs border border-gray-300 rounded px-2 py-1 bg-white focus:outline-none focus:ring-1 focus:ring-indigo-500">
  {% for value, label in status_choices %}
  <option value="{{ value }}" {% if finding.status == value %}selected{% endif %}>{{ label }}</option>
  {% endfor %}
</select>
