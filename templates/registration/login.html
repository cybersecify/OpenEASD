<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — OpenEASD</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-indigo-700">OpenEASD</h1>
      <p class="text-gray-500 text-sm mt-1">Automated External Attack Surface Detection</p>
    </div>

    <div class="bg-white rounded-lg shadow p-8">
      <h2 class="text-lg font-semibold text-gray-800 mb-6">Sign in</h2>

      {% if form.errors %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-700 text-sm rounded-md px-4 py-3">
        Invalid username or password.
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" name="username" autofocus autocomplete="username"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" name="password" autocomplete="current-password"
                 class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-medium text-sm">
          Sign in
        </button>
      </form>
    </div>
  </div>

</body>
</html>
