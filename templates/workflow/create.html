{% extends "base.html" %}

{% block title %}New Workflow{% endblock %}

{% block content %}
<div class="mb-6">
  <a href="{% url 'workflow-list' %}" class="text-indigo-600 text-sm hover:underline">&larr; Workflows</a>
  <h1 class="text-2xl font-bold text-gray-900 mt-2">New Workflow</h1>
</div>

{% if error %}
<div class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded">{{ error }}</div>
{% endif %}

<form method="post" class="space-y-6 max-w-2xl">
  {% csrf_token %}

  <div class="bg-white rounded-lg shadow px-6 py-5 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" required placeholder="e.g. Quick Scan"
             class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea name="description" rows="2" placeholder="Optional description"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" name="is_default" id="is_default" class="rounded border-gray-300 text-indigo-600">
      <label for="is_default" class="text-sm text-gray-700">Set as default workflow</label>
    </div>
  </div>

  <div class="bg-white rounded-lg shadow px-6 py-5">
    <h2 class="font-semibold text-gray-700 mb-4">Tools to include</h2>
    <div class="space-y-2">
      {% for tool_key, tool_label in tool_choices %}
      <label class="flex items-center gap-3 cursor-pointer">
        <input type="checkbox" name="tools" value="{{ tool_key }}" checked
               class="rounded border-gray-300 text-indigo-600">
        <span class="text-sm text-gray-700">{{ tool_label }}</span>
      </label>
      {% endfor %}
    </div>
  </div>

  <div class="flex gap-3">
    <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-md text-sm hover:bg-indigo-700">
      Create Workflow
    </button>
    <a href="{% url 'workflow-list' %}" class="px-5 py-2 rounded-md text-sm border border-gray-300 text-gray-700 hover:bg-gray-50">
      Cancel
    </a>
  </div>
</form>
{% endblock %}
